<template>
    <lightning-card>
        <div class="slds-p-horizontal_small slds-p-bottom_small">
            <!-- Header -->
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-p-bottom_x-small">
                <div class="header-text">
                    <h2 class="slds-text-heading_small header-title">Lead History (by Phone Number)</h2>
                    <p class="slds-text-body_small slds-text-color_weak">{subtitle}</p>
                </div>
                <lightning-button-icon
                    icon-name="utility:refresh"
                    variant="border-filled"
                    alternative-text="Refresh"
                    title="Refresh"
                    onclick={handleRefresh}>
                </lightning-button-icon>
            </div>

            <!-- One card per matching Lead -->
            <template lwc:if={hasLeads}>
                <template for:each={leads} for:item="lead">
                    <article key={lead.id} class="slds-box slds-box_x-small slds-m-bottom_x-small lead-card">
                        <!-- Name + Status -->
                        <div class="slds-grid slds-wrap slds-grid_align-spread slds-grid_vertical-align-center lead-card__head">
                            <lightning-formatted-url
                                class="lead-name"
                                value={lead.recordUrl}
                                label={lead.name}
                                target="_self">
                            </lightning-formatted-url>
                            <lightning-badge label={lead.status} class="slds-m-left_xx-small"></lightning-badge>
                        </div>

                        <!-- Fields -->
                        <div class="lead-field">
                            <span class="lead-label">Phone</span>
                            <span class="lead-value">{lead.phone}</span>
                        </div>
                        <div class="lead-field">
                            <span class="lead-label">Project</span>
                            <span class="lead-value">{lead.project}</span>
                        </div>
                        <div class="lead-field">
                            <span class="lead-label">Owner</span>
                            <span class="lead-value">{lead.ownerName}</span>
                        </div>
                        <div class="lead-field">
                            <span class="lead-label">Created</span>
                            <span class="lead-value">
                                <lightning-formatted-date-time
                                    value={lead.createdDate}
                                    year="numeric" month="short" day="2-digit"
                                    hour="2-digit" minute="2-digit">
                                </lightning-formatted-date-time>
                            </span>
                        </div>
                    </article>
                </template>

                <!-- Footer -->
                <p class="slds-text-body_small slds-text-color_weak slds-p-top_x-small">
                    <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                    {footer}
                </p>
            </template>

            <!-- Empty state -->
            <template lwc:if={isEmpty}>
                <p class="slds-text-body_regular slds-p-vertical_small slds-text-color_weak">
                    No other leads found with this phone number.
                </p>
            </template>

            <!-- Error state -->
            <template lwc:if={error}>
                <p class="slds-text-color_error slds-p-vertical_small">
                    Unable to load lead history.
                </p>
            </template>
        </div>
    </lightning-card>
</template>
